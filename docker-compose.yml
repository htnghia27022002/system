name: system

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-myapp_pg}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - ./docker/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-myapp_pg}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - system_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./docker/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - system_net

  be:
    build:
      context: .
      dockerfile: docker/be/Dockerfile.dev
    restart: unless-stopped
    volumes:
      - ./be:/app
    environment:
      CONFIG_FILE: config.yaml
      DB_HOST: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-myapp_pg}
      DB_USER: ${POSTGRES_USER:-postgres}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: ${CORS_ORIGINS:-http://system.local,http://system.local:8080,http://localhost,http://localhost:8080,http://127.0.0.1,http://127.0.0.1:8080}
      OAUTH_REDIRECT_URL: ${OAUTH_REDIRECT_URL:-http://system.local/auth/callback}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - system_net

  fe:
    build:
      context: .
      dockerfile: docker/fe/Dockerfile.dev
    restart: unless-stopped
    volumes:
      - ./fe:/app/fe
      - ./package.json:/app/package.json
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml
      - fe_node_modules:/app/fe/node_modules
      - fe_next:/app/fe/.next
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://system.local/api}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-System App}
      NEXT_PUBLIC_USE_MOCK_API: ${NEXT_PUBLIC_USE_MOCK_API:-false}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://system.local}
      WATCHPACK_POLLING: "true"
    depends_on:
      - be
    networks:
      - system_net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/config:/etc/nginx/config:ro
    depends_on:
      - be
      - fe
    networks:
      - system_net

  be-prod:
    profiles: [prod]
    build:
      context: .
      dockerfile: docker/be/Dockerfile.prod
    restart: unless-stopped
    environment:
      CONFIG_FILE: config.yaml
      DB_HOST: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-myapp_pg}
      DB_USER: ${POSTGRES_USER:-postgres}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: ${CORS_ORIGINS:-http://system.local,http://system.local:8080,http://localhost,http://localhost:8080,http://127.0.0.1,http://127.0.0.1:8080}
      OAUTH_REDIRECT_URL: ${OAUTH_REDIRECT_URL:-http://system.local/auth/callback}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - system_net

  fe-prod:
    profiles: [prod]
    build:
      context: .
      dockerfile: docker/fe/Dockerfile.prod
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://system.local/api}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-System App}
        NEXT_PUBLIC_USE_MOCK_API: ${NEXT_PUBLIC_USE_MOCK_API:-false}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://system.local}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - be-prod
    networks:
      - system_net

  nginx-prod:
    profiles: [prod]
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/config:/etc/nginx/config:ro
    depends_on:
      - be-prod
      - fe-prod
    networks:
      - system_net

networks:
  system_net:
    driver: bridge

volumes:
  fe_node_modules:
  fe_next:
